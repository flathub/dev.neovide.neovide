id: dev.neovide.neovide
command: neovide-wrapper
runtime: org.freedesktop.Sdk
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
  - org.freedesktop.Sdk.Extension.rust-stable
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --talk-name=org.freedesktop.Flatpak
  - --filesystem=host
  - --share=network
  - --env=TERM=xterm-256color
modules:
  - modules/host-spawn/host-spawn.yml
  - modules/fd/fd.yml
  - modules/ripgrep/ripgrep.yml
  - modules/neovim/neovim.yml
  - modules/tree-sitter-parsers/tree-sitter-parsers.yml
  - modules/wrapper/wrapper.yml
  - name: neovide
    sources:
      - modules/neovide/neovide-cargo-sources.yml
      - type: file
        path: modules/neovide/dev.neovide.neovide.metainfo.xml
      - type: git
        url: https://github.com/neovide/neovide
        tag: 0.16.1
        commit: 084db1b1412d4975d74a781051c0122e53bb0332
        x-checker-data:
          type: git
      - type: file
        only-arches:
          - x86_64
        url: https://github.com/rust-skia/skia-binaries/releases/download/0.93.1/skia-binaries-319323662b1685a112f5-x86_64-unknown-linux-gnu-gl-jpegd-jpege-pdf-textlayout.tar.gz
        dest-filename: skia-binaries.tar.gz
        sha256: 6f0834bb033317297ada150fd9e003c9f47fcce82ed43b40b0bc5411e705a49d
      - type: file
        only-arches:
          - aarch64
        url: https://github.com/rust-skia/skia-binaries/releases/download/0.93.1/skia-binaries-319323662b1685a112f5-aarch64-unknown-linux-gnu-gl-jpegd-jpege-pdf-textlayout.tar.gz
        dest-filename: skia-binaries.tar.gz
        sha256: 10b872d1656ddba12eef9e2866795a5ef02fd6700929545ebb97e21806b5db57
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/neovide/cargo
        SKIA_BINARIES_URL: file:///run/build/neovide/skia-binaries.tar.gz
        FORCE_SKIA_BINARIES_DOWNLOAD: '1'
    buildsystem: simple
    build-commands:
      - cargo --frozen build --release
      - install -Dm755 target/release/neovide -t /app/bin
      - install -Dm644 dev.neovide.neovide.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm644 assets/neovide.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm644 assets/neovide.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - desktop-file-edit --set-icon="${FLATPAK_ID}" /app/share/applications/${FLATPAK_ID}.desktop
      - desktop-file-edit --set-key=Exec --set-value=neovide-wrapper /app/share/applications/${FLATPAK_ID}.desktop
cleanup:
  - /bin/xclip-*file
  - /lib/pkgconfig
  - /lib/cmake
  - /share/man
  - /include
  - '*.la'
  - '*.a'

