id: dev.neovide.neovide
command: neovide-wrapper
runtime: org.freedesktop.Sdk
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm22
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --talk-name=org.freedesktop.Flatpak
  - --filesystem=host
  - --share=network
  - --env=TERM=xterm-256color
modules:
  - modules/host-spawn/host-spawn.yml
  - modules/fd/fd.yml
  - modules/ripgrep/ripgrep.yml
  - modules/neovim/neovim.yml
  - modules/tree-sitter-parsers/tree-sitter-parsers.yml
  - modules/wrapper/wrapper.yml
  - modules/gn/gn.yml
  - name: neovide
    sources:
      - modules/neovide/neovide-cargo-sources.yml
      - type: file
        path: modules/neovide/dev.neovide.neovide.metainfo.xml
      - type: git
        url: https://github.com/rust-skia/skia
        tag: m145-0.92.0
        commit: 37e26f9cc16e89c8f28d386e6748e43475f7e4a9
        dest: skia
      - type: git
        url: https://github.com/neovide/neovide
        tag: 0.16.2
        commit: d2d6ebd4ee6b8b645c9b9a3b0d5d30923509b2c0
        x-checker-data:
          type: git
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        PATH: /usr/lib/sdk/llvm22/bin:/usr/lib/sdk/rust-stable/bin:/app/bin:/usr/bin
        LIBCLANG_PATH: /usr/lib/sdk/llvm22/lib
        FORCE_SKIA_BUILD: '1'
        SKIA_GN_ARGS: skia_use_wuffs=false
        SKIA_GN_COMMAND: /app/bin/gn
        SKIA_NINJA_COMMAND: /usr/bin/ninja
        SKIA_SOURCE_DIR: /run/build/neovide/skia
        SKIA_USE_SYSTEM_LIBRARIES: '1'
        CARGO_HOME: /run/build/neovide/cargo
    buildsystem: simple
    build-commands:
      - cargo --frozen build --release
      - install -Dm755 target/release/neovide -t /app/bin
      - install -Dm644 dev.neovide.neovide.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm644 assets/neovide.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm644 assets/neovide.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - desktop-file-edit --set-icon="${FLATPAK_ID}" /app/share/applications/${FLATPAK_ID}.desktop
      - desktop-file-edit --set-key=Exec --set-value=neovide-wrapper /app/share/applications/${FLATPAK_ID}.desktop
cleanup:
  - /share/applications/nvim.desktop
  - /share/bash-completion
  - /share/man
  - /lib/pkgconfig
  - /lib/cmake
  - /bin/xclip-*file
  - /bin/gn
  - /include
  - '*.la'
  - '*.a'
